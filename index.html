<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Download app — 3 buttons</title>
  <style>
    :root{--primary:#00A8E8;--secondary:#2A9D8F;--tertiary:#E9C46A}
    *{box-sizing:border-box}
    body{display:flex;align-items:center;justify-content:center;height:100vh;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial}
    .container{display:flex;flex-direction:column;gap:14px;align-items:center;padding:20px}
    h2{margin:0 0 6px}
    .btn{padding:12px 20px;border-radius:10px;border: none;background:var(--primary);color:white;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,0.12);transition:transform .12s ease}
    .btn:active{transform:translateY(1px)}
    .btn.secondary{background:var(--secondary)}
    .btn.tertiary{background:var(--tertiary);color:#000}
    .note{font-size:13px;color:#555;margin-top:8px}
    .footer{margin-top:6px;font-size:12px;color:#888}
  </style>
</head>
<body>
  <div class="container">
    <h2>Download files</h2>
    <button class="btn" id="downloadPy">Download <code>script.py</code></button>
    <button class="btn secondary" id="downloadYaml">Download <code>data.yaml</code></button>
    <button class="btn tertiary" id="downloadHtml">Download <code>page.html</code></button>

  </div>

  <script>
    function download(filename, content, mime) {
      const blob = new Blob([content], { type: mime || 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    const pyContent = `#!/usr/bin/env python3
"""Example script"""

def greet(name='World'):
    print(f'Hello, {name}!')

if __name__ == '__main__':
    greet()
`;

    const yamlContent = `# Example data.yaml
app:
  name: DownloadApp
  version: 1.0
users:
  - id: 1
    name: Mathias
`;

    const htmlContent = `<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Downloaded Page</title>
</head>
<body>
  <h1>This is the downloaded HTML file</h1>
  <p>Make changes and save as <code>.html</code> to open it locally.</p>
</body>
</html>
`;

    document.getElementById('downloadPy').addEventListener('click', () => {
      download('script.py', pyContent, 'text/x-python');
    });

    document.getElementById('downloadYaml').addEventListener('click', () => {
      download('data.yaml', yamlContent, 'text/yaml');
    });

    document.getElementById('downloadHtml').addEventListener('click', () => {
      download('page.html', htmlContent, 'text/html');
    });
  </script>
</body>
</html>
